<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Frontend LB Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0d1117; color: #e6edf3;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px;
            padding: 40px; text-align: center; max-width: 500px; width: 90%; }
    h1 { color: #58a6ff; font-size: 2rem; margin-bottom: 8px; }
    .subtitle { color: #8b949e; margin-bottom: 32px; }
    .server-box { background: #0d1117; border: 2px solid #238636; border-radius: 8px;
                  padding: 20px; margin: 20px 0; }
    .server-label { color: #3fb950; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
    .server-name  { color: #f0f6fc; font-size: 1.4rem; font-weight: bold; margin-top: 6px; font-family: monospace; }
    .btn { background: #238636; color: white; border: none; padding: 12px 28px;
           border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 16px; }
    .btn:hover { background: #2ea043; }
    .hit-count { color: #8b949e; font-size: 0.9rem; margin-top: 12px; }
    #log { text-align: left; background: #0d1117; border-radius: 6px; padding: 12px;
           margin-top: 20px; max-height: 180px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; }
    .log-entry { padding: 3px 0; border-bottom: 1px solid #21262d; color: #3fb950; }
  </style>
</head>
<body>
  <div class="card">
    <h1> Docker_NGINX LB Demo</h1>
    <p class="subtitle">Each click hits the Load Balancer — watch which container responds!</p>
    <div class="server-box">
      <div class="server-label">Currently Served By Container</div>
      <div class="server-name" id="server-name">Click the button below</div>
    </div>
    <button class="btn" onclick="ping()">🔄 Ping Load Balancer</button>
    <div class="hit-count" id="hit-count"></div>
    <div id="log"></div>
  </div>
  <script>
    let count = 0;
    async function ping() {
      try {
        const res  = await fetch('/whoami');
        const data = await res.json();
        count++;
        document.getElementById('server-name').textContent  = data.hostname;
        document.getElementById('hit-count').textContent    = 'Total requests: ' + count;
        const log   = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className   = 'log-entry';
        entry.textContent = '[' + count + '] served by: ' + data.hostname;
        log.prepend(entry);
      } catch(e) {
        document.getElementById('server-name').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
