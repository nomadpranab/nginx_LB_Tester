events {
    worker_connections 1024;
}

http {
    # ── Upstream pool — all 3 app replicas ──────────────────────────────────
    # Default algorithm: Round Robin (no keyword needed)
    # Nginx will distribute requests: app1 → app2 → app3 → app1 → ...
    upstream frontend_servers {
        server app1:80;
        server app2:80;
        server app3:80;

        # ── Alternative algorithms (uncomment one to test) ──
        # least_conn;            # Send to server with fewest active connections
        # ip_hash;               # Same client IP always hits same server (sticky sessions)
        # random;                # Random selection
    }

    server {
        listen 80;

        location / {
            proxy_pass          http://frontend_servers;

            # Forward real client info to backend
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;

            # KEY: This response header shows WHICH upstream server handled the request
            # Visible with: curl -I http://localhost:8080
            add_header          X-Served-By       $upstream_addr always;
        }
    }
}
