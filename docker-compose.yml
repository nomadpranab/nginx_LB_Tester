version: "3.8"

services:

  # ── App Replica 1 ──────────────────────────────────────────────────────────
  app1:
    build: .
    container_name: frontend_app1
    networks:
      - frontend_net
    # NO host port mapping — only LB can reach these containers

  # ── App Replica 2 ──────────────────────────────────────────────────────────
  app2:
    build: .
    container_name: frontend_app2
    networks:
      - frontend_net

  # ── App Replica 3 ──────────────────────────────────────────────────────────
  app3:
    build: .
    container_name: frontend_app3
    networks:
      - frontend_net

  # ── Load Balancer ───────────────────────────────────────────────────────────
  lb:
    image: nginx:alpine
    container_name: frontend_lb
    ports:
      - "8080:80"          # ONLY the LB is exposed to your machine
    volumes:
      - ./lb/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - frontend_net

networks:
  frontend_net:
    driver: bridge          # All containers share this private virtual network
